<!-- site_templates/components/friend_link.html -->
<div class="friend-card">
    <a href="{{ link.url }}" target="_blank" class="friend-link-inner">
        <div class="friend-avatar">
            <img src="{{ link.avatar }}" alt="{{ link.name }}" loading="lazy"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2260%22 viewBox=%220 0 60 60%22%3E%3Crect fill=%22%23e0e4ff%22 width=%2260%22 height=%2260%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 fill=%22%23667eea%22 font-size=%2224%22%3E{{ link.name|first|default:'F' }}%3C/text%3E%3C/svg%3E'">
        </div>
        
        <div class="friend-info">
            <h3 class="friend-name">{{ link.name }}</h3>
            <p class="friend-description">{{ link.description }}</p>
            <span class="friend-url">{{ link.url|truncatechars:40 }}</span>
        </div>
    </a>
</div>
