<!-- site_templates/components/footer.html -->
<footer class="footer">
  <div class="container">
    <div class="footer-links">
      {% if site.url %}
      <a href="{{ site.url }}" target="_blank">Website</a>
      {% endif %}
      {% if site.email %}
      <a href="mailto:{{ site.email }}">Email</a>
      {% endif %}
    </div>
    <p>© {{ site.title|default:'EDGP Blog' }}. Powered by Django & GitHub Pages.</p>
  </div>
</footer>
