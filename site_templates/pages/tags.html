{% extends 'base.html' %}

{% block title %}标签 - {{ site.title|default:'EDGP Blog' }}{% endblock %}

{% block content %}
<!-- 页面头部 -->
<header class="page-header">
    <h1 class="page-title">🏷️ 标签</h1>
    <p class="page-description">共 {{ tags|length }} 个标签</p>
</header>

<!-- 主内容区 -->
<main class="container" style="padding-bottom: 3rem;">
    <div class="tags-cloud">
        {% for tag in tags %}
        <a href="{{ url_prefix }}tags/{{ tag.slug }}.html" class="tag">
            {{ tag.name }}
            {% if tag.post_count %}
            <span style="font-size: 0.75em; opacity: 0.7;">({{ tag.post_count }})</span>
            {% endif %}
        </a>
        {% empty %}
        <p class="empty-state">暂无标签</p>
        {% endfor %}
    </div>
</main>
{% endblock %}
