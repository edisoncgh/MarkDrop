{% extends 'base.html' %}

{% block title %}友链 - {{ site.title }}{% endblock %}

{% block content %}
<h1 class="mb-4">友情链接</h1>

<div class="friend-links">
{% for link in links %}

{% empty %}

</div>

<hr class="my-4">

<p class="text-muted">
    欢迎交换友链！请通过 About 页面的联系方式与我联系。
</p>
{% endblock %}
